.pb{height:4px;background:var(--border);border-radius:2px;margin:4px 0 10px;overflow:hidden}

async function ghRead(token){
  const r=await fetch(API,{headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json'}});
  if(r.status===404)return{data:DEFAULT,sha:null};
  if(!r.ok)throw new Error(`${r.status}`);
  const j=await r.json();
  const bytes=Uint8Array.from(atob(j.content.replace(/\n/g,'')),c=>c.charCodeAt(0));
  return{data:JSON.parse(new TextDecoder('utf-8').decode(bytes)),sha:j.sha};
}
async function ghWrite(token,data,sha){
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const body={message:'Update data',content,branch:BRANCH};
  if(sha)body.sha=sha;
  const r=await fetch(API,{method:'PUT',headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json();throw new Error(e.message);}
  return (await r.json()).content.sha;
}

function Icon({d,size=22}){return React.createElement('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,width:size,height:size},React.createElement('path',{strokeLinecap:'round',strokeLinejoin:'round',d}));}

function Setup({onSave}){
  const [tok,setTok]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const go=async()=>{
    if(!tok.trim()){setErr('Cola o token.');return;}
    setLoading(true);setErr('');
    try{await ghRead(tok.trim());localStorage.setItem('gh_tok',tok.trim());onSave(tok.trim());}
    catch(e){setErr('Token inválido ou sem acesso ao repositório.');}
    setLoading(false);
  };
  return React.createElement('div',{className:'setup-wrap'},
    React.createElement('h2',null,'Ligar ao GitHub'),
    React.createElement('p',null,'A app guarda os dados no teu repositório GitHub para sincronizares entre PC e telemóvel. Introduz o teu Personal Access Token (scope: repo).'),
    React.createElement('div',{className:'field'},
      React.createElement('label',null,'Personal Access Token'),
      React.createElement('input',{type:'password',value:tok,onChange:e=>setTok(e.target.value),placeholder:'ghp_...',onKeyDown:e=>e.key==='Enter'&&go()})
    ),
    err&&React.createElement('div',{className:'al al-r'},err),
    React.createElement('button',{className:'btn btn-p',style:{width:'100%'},onClick:go,disabled:loading},loading?'A verificar...':'Ligar'),
    React.createElement('p',{style:{fontSize:12,color:'var(--text3)',marginTop:12,lineHeight:1.5}},'Cria em: github.com → Settings → Developer settings → Personal access tokens (classic) → scope: repo')
  );
}

  const [gt,setGt]=useState('fluxo');
  const [sync,setSync]=useState('idle');
  const [ready,setReady]=useState(false);
  const timer=useRef(null);

  useEffect(()=>{
    if(!token)return;
    setSync('syncing');
    ghRead(token).then(({data,sha:s})=>{
      setOps(data.ops||[]);setTasks(data.tasks||TASKS0);setCl(data.cl||{});setSha(s);setSync('ok');setReady(true);
    }).catch(()=>{setSync('err');setReady(true);});
  },[token]);

  const push=useCallback((d,s)=>{
    setSync('syncing');
    if(timer.current)clearTimeout(timer.current);
    timer.current=setTimeout(()=>{
      ghWrite(token,d,s).then(ns=>{setSha(ns);setSync('ok');}).catch(()=>setSync('err'));
    },1500);
  },[token]);

  const updOps=v=>{setOps(v);push({ops:v,tasks,cl},sha);};
  const updTasks=v=>{setTasks(v);push({ops,tasks:v,cl},sha);};
  const updCl=v=>{setCl(v);push({ops,tasks,cl:v},sha);};

  if(!token)return React.createElement(Setup,{onSave:t=>setToken(t)});
  if(!ready)return React.createElement('div',{style:{padding:40,textAlign:'center',color:'var(--text2)'}},'A carregar dados do GitHub...');

  const TABS=[{k:'ops',l:'Oportunidades',d:'M3 7h18M3 12h18M3 17h12'},{k:'checklist',l:'Checklist',d:'M9 12l2 2 4-4M5 12a7 7 0 1014 0A7 7 0 005 12'},{k:'tarefas',l:'Tarefas',d:'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2M9 12h6M9 16h4'},{k:'guias',l:'Guias',d:'M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.966 8.966 0 00-6 2.292m0-14.25v14.25'}];

  if(form!==null){

    const hm=form.revenda&&form.precoMax;
    const save=()=>{if(!form.titulo.trim())return;const nops=editId?ops.map(o=>o.id===editId?{...form,id:editId}:o):[...ops,{...form,id:genId(ops)}];updOps(nops);setForm(null);setEditId(null);};
    const del=()=>{if(confirm('Eliminar?')){updOps(ops.filter(o=>o.id!==editId));setForm(null);setEditId(null);}};
    const F=(l,k,t,p)=>React.createElement('div',{className:'field'},React.createElement('label',null,l),React.createElement('input',{type:t||'text',value:form[k],onChange:e=>upd(k,e.target.value),placeholder:p||''}));
    const Sel=(l,k,opts)=>React.createElement('div',{className:'field'},React.createElement('label',null,l),React.createElement('select',{value:form[k],onChange:e=>upd(k,e.target.value)},opts.map(o=>React.createElement('option',{key:o},o))));
    return React.createElement('div',null,
      React.createElement('div',{className:'sync-bar'},React.createElement('span',null,React.createElement('span',{className:`sync-dot ${dotClass}`}),syncLabel[sync])),
      React.createElement('div',{className:'content'},
        React.createElement('div',{className:'fh'},
          React.createElement('button',{onClick:()=>{setForm(null);setEditId(null);},style:{border:'none',background:'none',cursor:'pointer',color:'var(--text2)',fontSize:21,padding:0}},'←'),
          React.createElement('span',{style:{fontSize:18,fontWeight:600}},editId?'Editar oportunidade':'Nova oportunidade')
        ),
        hm&&React.createElement('div',{className:`al ${m>=30?'al-g':m>0?'al-a':'al-r'}`},`Margem: ${m>=0?'+':''}${m.toFixed(0)}€ — ${m>=30?'✓ Boa margem':m>0?'Margem baixa':'Negativa!'}`),
        F('Título','titulo','text','ex: Candeeiro de pé vintage metal'),
        React.createElement('div',{className:'r2'},Sel('Fonte','fonte',OPT.fonte),Sel('Pipeline','pipeline',OPT.pipeline)),
        F('Link','link','url','https://...'),
        React.createElement('div',{className:'r2'},Sel('Tipo','tipo',OPT.tipo),Sel('Estilo','estilo',OPT.estilo)),
        React.createElement('div',{className:'r2'},F('Preço pedido (€)','precoPedido','number','0'),F('Preço máx. (€)','precoMax','number','máx 50€')),
        F('Revenda alvo (€)','revenda','number','≥90€'),
        React.createElement('div',{className:'r2'},Sel('Estado físico','fisico',OPT.fisico),Sel('Estado elétrico','eletrico',OPT.eletrico)),
        React.createElement('div',{className:'r2'},Sel('Transporte','transporte',OPT.transporte),Sel('Score','score',['1','2','3','4','5'])),
        React.createElement('div',{className:'field'},React.createElement('label',null,'Notas'),React.createElement('textarea',{value:form.notas,onChange:e=>upd('notas',e.target.value),placeholder:'Observações...'})),
        React.createElement('div',{style:{display:'flex',gap:8}},
          React.createElement('button',{className:'btn btn-p',style:{flex:1},onClick:save},editId?'Guardar':'Adicionar'),
          editId&&React.createElement('button',{className:'btn btn-d btn-sm',onClick:del},'Eliminar')
        )
      ),
      React.createElement('nav',{className:'nav'},React.createElement('button',{onClick:()=>{setForm(null);setEditId(null);}},React.createElement(Icon,{d:'M15 19l-7-7 7-7',size:18}),'Voltar'))
    );
  }

  return React.createElement('div',null,
    React.createElement('div',{className:'sync-bar'},

  );
}

function OpsTab({ops,openAdd,openEdit}){
  const vend=ops.filter(o=>o.pipeline==='vendidas');
  const tm=vend.reduce((s,o)=>s+((parseFloat(o.revenda)||0)-(parseFloat(o.precoMax)||0)),0);
